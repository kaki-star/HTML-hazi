<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/mystyle.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <title>Kapcsolat</title>
</head>
<body>
<div class="container pt-5 ">
  <h1>Kapcsolat</h1>
  <p>Kérjük töltse ki az alábbi űrlapot!</p>
  <img src="img/kontakt.png" class="rounded" alt="Cinque Terre", width="50px">
    <div class="row">
        <div class="col p-12 colcolor">
            <form action="">

            <table class="table">
                <tbody>
                <tr>
                    <td><strong>Név:</strong></td>
                    <td><input type="text" class="form-control" id="name" placeholder="Név" name="Name"></td>
                </tr>
                <tr>
                    <td><strong>E-mail:</strong></td>
                    <td><input type="email" class="form-control" id="email" placeholder="E-mail cím" name="email"></td>
                </tr>
                <tr>
                    <td><strong>Üzenet:</strong></td>
                    <td><input type="text" class="form-control" id="message" placeholder="Üzenet" name="message"></td>
                </tr>
                </tbody>
            </table>
            
            <button type="submit" class="btn btn-primary">Küldés</button>
            </form>
        </div>
    </div>
</div>


</body>
</html>
